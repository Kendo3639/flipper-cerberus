<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#070a14"/>
      <stop offset="1" stop-color="#04060c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.28" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#0e3a4a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9fd8ff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <rect width="1280" height="400" fill="url(#vign)"/>
  <rect x="6" y="6" width="1268" height="388" rx="14" fill="none" stroke="#22d3ee" stroke-opacity="0.20" stroke-width="2"/>

  <!-- sonar emblem: three heads watching three bands -->
  <g filter="url(#glow)" fill="none" stroke-width="7" stroke-linecap="round">
    <path d="M 215 145 A 60 60 0 0 1 215 265"  stroke="#34d399"/>
    <path d="M 215 105 A 100 100 0 0 1 215 305" stroke="#22d3ee"/>
    <path d="M 215 65 A 140 140 0 0 1 215 345" stroke="#f472b6"/>
  </g>
  <line x1="215" y1="205" x2="215" y2="35" stroke="#9fb4ff" stroke-opacity="0.5" stroke-width="3" filter="url(#softglow)"/>
  <circle cx="215" cy="35" r="6" fill="#e6f6ff" filter="url(#glow)"/>
  <circle cx="215" cy="205" r="13" fill="#04060c" stroke="#22d3ee" stroke-width="3" filter="url(#glow)"/>
  <circle cx="215" cy="205" r="4" fill="#22d3ee"/>
  <!-- scanning blip on the outer arc -->
  <circle cx="355" cy="205" r="5" fill="#f472b6" filter="url(#glow)"/>

  <!-- wordmark -->
  <text x="432" y="178" font-size="118" font-weight="bold" letter-spacing="6"
        fill="url(#title)" filter="url(#glow)">CERBERUS</text>
  <text x="438" y="224" font-size="25" letter-spacing="9" font-family="'Courier New', monospace"
        fill="#7fe7ff">SUB-GHZ &#183; RF WATCHDOG</text>

  <!-- band pills -->
  <g font-family="'Courier New', monospace" font-size="20" font-weight="bold" text-anchor="middle">
    <g>
      <rect x="438" y="250" width="128" height="34" rx="17" fill="#0c2a22" stroke="#34d399" stroke-width="2"/>
      <text x="502" y="273" fill="#34d399">433 MHz</text>
    </g>
    <g>
      <rect x="582" y="250" width="128" height="34" rx="17" fill="#082230" stroke="#22d3ee" stroke-width="2"/>
      <text x="646" y="273" fill="#22d3ee">868 MHz</text>
    </g>
    <g>
      <rect x="726" y="250" width="128" height="34" rx="17" fill="#2a1326" stroke="#f472b6" stroke-width="2"/>
      <text x="790" y="273" fill="#f472b6">915 MHz</text>
    </g>
  </g>

  <!-- top-right tech tag -->
  <text x="1230" y="48" text-anchor="end" font-family="'Courier New', monospace" font-size="18"
        letter-spacing="3" fill="#f59e0b" fill-opacity="0.92">CC1101 &#183; FLIPPER ZERO</text>

