  <circle cx="980" cy="300" r="4" fill="#ef4444" filter="url(#glow)"/>
  <text x="980" y="292" text-anchor="middle" font-family="'Courier New', monospace" font-size="17"
        font-weight="bold" fill="#ef4444" filter="url(#softglow)">&#9888; JAM</text>
  <line x1="70" y1="366" x2="1210" y2="366" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1"/>
</svg>